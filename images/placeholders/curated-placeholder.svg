<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-label="Curated image placeholder">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7F4EF"/>
      <stop offset="0.55" stop-color="#EEE8E0"/>
      <stop offset="1" stop-color="#DDE6EA"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="900" height="1200" fill="url(#paper)"/>
  <rect width="900" height="1200" filter="url(#grain)" opacity="0.25"/>
  <rect x="90" y="96" width="720" height="1008" fill="none" stroke="#2B2B2B" stroke-opacity="0.12"/>
  <text x="450" y="585" text-anchor="middle" font-family="Georgia, serif" font-size="54" fill="#2B2B2B" fill-opacity="0.42" letter-spacing="16">AZI</text>
  <text x="450" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2B2B2B" fill-opacity="0.34" letter-spacing="7">IMAGE TO BE REPLACED</text>
</svg>
